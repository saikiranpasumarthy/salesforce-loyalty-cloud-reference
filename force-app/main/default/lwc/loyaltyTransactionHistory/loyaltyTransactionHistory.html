<template>
    <lightning-card title="Transaction History" icon-name="utility:receipt">
        <!-- Filters -->
        <div slot="actions">
            <lightning-input
                type="date"
                label="From"
                value={fromDate}
                onchange={handleFromDate}
                class="slds-m-right_x-small"
            ></lightning-input>
        </div>

        <div class="slds-p-horizontal_medium slds-p-bottom_small">
            <lightning-layout>
                <lightning-layout-item size="6" padding="around-small">
                    <lightning-input type="date" label="From Date" value={fromDate} onchange={handleFromDate}></lightning-input>
                </lightning-layout-item>
                <lightning-layout-item size="6" padding="around-small">
                    <lightning-input type="date" label="To Date"   value={toDate}   onchange={handleToDate}></lightning-input>
                </lightning-layout-item>
                <lightning-layout-item size="8" padding="around-small">
                    <lightning-combobox
                        label="Transaction Type"
                        value={typeFilter}
                        options={typeFilterOptions}
                        onchange={handleTypeFilter}
                    ></lightning-combobox>
                </lightning-layout-item>
                <lightning-layout-item size="4" padding="around-small" class="slds-grid slds-grid_vertical-align-end">
                    <lightning-button label="Search" variant="brand" onclick={handleSearch}></lightning-button>
                </lightning-layout-item>
            </lightning-layout>
        </div>

        <template if:true={isLoading}>
            <div class="slds-p-around_medium slds-text-align_center">
                <lightning-spinner alternative-text="Loading..." size="small"></lightning-spinner>
            </div>
        </template>

        <template if:false={isLoading}>
            <template if:true={hasTransactions}>
                <lightning-datatable
                    key-field="id"
                    data={transactions}
                    columns={columns}
                    hide-checkbox-column
                ></lightning-datatable>
                <div class="slds-p-around_small slds-text-align_right">
                    <lightning-button
                        label="Load More"
                        onclick={handleLoadMore}
                        disabled={noMoreData}
                    ></lightning-button>
                </div>
            </template>
            <template if:false={hasTransactions}>
                <div class="slds-p-around_medium slds-text-align_center slds-text-color_weak">
                    No transactions found for the selected period.
                </div>
            </template>
        </template>
    </lightning-card>
</template>
