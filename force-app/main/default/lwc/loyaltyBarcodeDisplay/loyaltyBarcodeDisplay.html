<template>
    <lightning-card title="Loyalty Card" icon-name="utility:barcode">
        <template if:true={hasLoyaltyId}>
            <div class="slds-p-around_medium slds-text-align_center">
                <!-- Barcode rendered by JsBarcode (loaded via static resource) -->
                <svg lwc:ref="barcodeEl" class="loyalty-barcode"></svg>
                <p class="slds-text-body_small slds-m-top_small slds-text-color_weak">
                    {loyaltyId}
                </p>
                <p class="slds-text-body_small slds-text-color_weak">{memberName}</p>
                <lightning-button
                    label="Refresh"
                    icon-name="utility:refresh"
                    size="small"
                    onclick={handleRefresh}
                    class="slds-m-top_small"
                ></lightning-button>
            </div>
        </template>
        <template if:false={hasLoyaltyId}>
            <div class="slds-p-around_medium slds-text-align_center slds-text-color_weak">
                <lightning-icon icon-name="utility:ban" size="medium"></lightning-icon>
                <p class="slds-m-top_small">No loyalty membership linked to this contact.</p>
            </div>
        </template>
    </lightning-card>
</template>
