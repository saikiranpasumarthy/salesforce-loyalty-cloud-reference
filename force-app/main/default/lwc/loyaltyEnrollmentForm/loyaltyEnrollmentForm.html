<template>
    <lightning-card title="Join Our Loyalty Program" icon-name="standard:loyalty_program">
        <!-- Success state -->
        <template if:true={enrollmentSuccess}>
            <div class="slds-p-around_medium">
                <div class="slds-notify slds-notify_toast slds-theme_success" role="status">
                    <p class="slds-text-heading_small">
                        Welcome! Your Loyalty ID is: <strong>{loyaltyId}</strong>
                    </p>
                    <p>You've been enrolled as a <strong>{memberType}</strong> member at the <strong>{tier}</strong> tier.</p>
                </div>
            </div>
        </template>

        <!-- Enrollment form -->
        <template if:false={enrollmentSuccess}>
            <div class="slds-p-around_medium">
                <!-- Error banner -->
                <template if:true={errorMessage}>
                    <div class="slds-notify slds-notify_alert slds-alert_error" role="alert">
                        <lightning-icon icon-name="utility:error" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                        {errorMessage}
                    </div>
                    <div class="slds-m-top_small"></div>
                </template>

                <!-- Duplicate warning (non-blocking) -->
                <template if:true={duplicateWarning}>
                    <div class="slds-notify slds-notify_alert slds-alert_warning">
                        <lightning-icon icon-name="utility:warning" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                        An account with this email already exists. Please check your membership status.
                    </div>
                    <div class="slds-m-top_small"></div>
                </template>

                <lightning-layout multiple-rows>
                    <!-- Name fields -->
                    <lightning-layout-item size="6" padding="around-small">
                        <lightning-input
                            label="First Name"
                            value={firstName}
                            required
                            onchange={handleFirstName}
                        ></lightning-input>
                    </lightning-layout-item>
                    <lightning-layout-item size="6" padding="around-small">
                        <lightning-input
                            label="Last Name"
                            value={lastName}
                            required
                            onchange={handleLastName}
                        ></lightning-input>
                    </lightning-layout-item>

                    <!-- Email with real-time duplicate check -->
                    <lightning-layout-item size="12" padding="around-small">
                        <lightning-input
                            label="Email Address"
                            type="email"
                            value={email}
                            required
                            onblur={handleEmailBlur}
                            onchange={handleEmail}
                            message-when-type-mismatch="Please enter a valid email address"
                        ></lightning-input>
                    </lightning-layout-item>

                    <!-- Phone -->
                    <lightning-layout-item size="6" padding="around-small">
                        <lightning-input
                            label="Phone"
                            type="tel"
                            value={phone}
                            onchange={handlePhone}
                            pattern="[0-9+\\-\\s()]{7,15}"
                            message-when-pattern-mismatch="Enter a valid phone number"
                        ></lightning-input>
                    </lightning-layout-item>

                    <!-- Member type selector -->
                    <lightning-layout-item size="6" padding="around-small">
                        <lightning-combobox
                            label="Membership Type"
                            value={memberType}
                            options={memberTypeOptions}
                            required
                            onchange={handleMemberType}
                        ></lightning-combobox>
                    </lightning-layout-item>

                    <!-- Birthday (month + day only — no year) -->
                    <lightning-layout-item size="6" padding="around-small">
                        <lightning-combobox
                            label="Birth Month"
                            value={dobMonth}
                            options={monthOptions}
                            onchange={handleDobMonth}
                        ></lightning-combobox>
                    </lightning-layout-item>
                    <lightning-layout-item size="6" padding="around-small">
                        <lightning-combobox
                            label="Birth Day"
                            value={dobDay}
                            options={dayOptions}
                            onchange={handleDobDay}
                        ></lightning-combobox>
                    </lightning-layout-item>

                    <!-- Pro-specific fields -->
                    <template if:true={isProMember}>
                        <lightning-layout-item size="6" padding="around-small">
                            <lightning-input
                                label="Professional License Number"
                                value={proLicenseNumber}
                                required
                                onchange={handleProLicense}
                            ></lightning-input>
                        </lightning-layout-item>
                        <lightning-layout-item size="6" padding="around-small">
                            <lightning-input
                                label="License Expiry Date"
                                type="date"
                                value={proLicenseExpiry}
                                required
                                onchange={handleProLicenseExpiry}
                            ></lightning-input>
                        </lightning-layout-item>
                    </template>

                    <!-- Student-specific fields -->
                    <template if:true={isStudentMember}>
                        <lightning-layout-item size="6" padding="around-small">
                            <lightning-input
                                label="School Name"
                                value={schoolName}
                                required
                                onchange={handleSchoolName}
                            ></lightning-input>
                        </lightning-layout-item>
                        <lightning-layout-item size="6" padding="around-small">
                            <lightning-input
                                label="Expected Graduation Date"
                                type="date"
                                value={graduationDate}
                                onchange={handleGraduationDate}
                            ></lightning-input>
                        </lightning-layout-item>
                    </template>
                </lightning-layout>

                <!-- Submit button -->
                <div class="slds-m-top_medium slds-text-align_right">
                    <lightning-button
                        label={submitLabel}
                        variant="brand"
                        onclick={handleSubmit}
                        disabled={isLoading}
                    ></lightning-button>
                </div>

                <!-- Loading spinner -->
                <template if:true={isLoading}>
                    <lightning-spinner alternative-text="Enrolling..."></lightning-spinner>
                </template>
            </div>
        </template>
    </lightning-card>
</template>
